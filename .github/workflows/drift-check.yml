      #   run: |
      #     git config user.email "actions@github.com"
      #     git config user.name "github-actions[bot]"
      #     git add reports/drift/latest.html reports/drift/latest_summary.json
      #     if ! git diff --staged --quiet; then
      #       git commit -m "chore: update drift report ($(date -u +%Y-%m-%d))"
      #       git push
      #     fi
