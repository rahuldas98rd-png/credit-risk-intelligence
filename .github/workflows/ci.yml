name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run when a new commit comes in for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest ruff

      - name: Lint with ruff
        run: ruff check src/ api/ tests/ app/

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  docker-smoke-test:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (with GHA cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: credit-risk-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d --name api-test -p 8000:8000 credit-risk-api:ci

      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8000/health > /dev/null 2>&1; then
              echo "API responding after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "API never came up — dumping logs:"
          docker logs api-test
          exit 1

      - name: Smoke test /health
        run: |
          response=$(curl -fs http://localhost:8000/health)
          echo "Response: $response"
          echo "$response" | grep -q '"status":"ok"' || (echo "Health check failed"; exit 1)

      - name: Smoke test /predict
        run: |
          response=$(curl -fs -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"features":{"EXT_SOURCE_1":0.5,"EXT_SOURCE_2":0.5,"EXT_SOURCE_3":0.5,"AMT_INCOME_TOTAL":150000,"AMT_CREDIT":300000,"AMT_ANNUITY":15000,"DAYS_BIRTH":14600},"explain":true}')
          echo "Response: $response"
          echo "$response" | grep -q '"default_probability"' || (echo "Predict failed"; exit 1)
          echo "$response" | grep -q '"top_risk_drivers"' || (echo "SHAP missing"; exit 1)

      - name: Cleanup
        if: always()
        run: docker rm -f api-test || true
