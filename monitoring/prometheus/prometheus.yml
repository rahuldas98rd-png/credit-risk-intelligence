global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "credit-risk-local"
    environment: "development"

scrape_configs:
  # Scrape the FastAPI service. Within the docker-compose network, the
  # service is reachable at `api:8000` (service name resolution).
  - job_name: "credit-risk-api"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "credit-risk-api"

  # Self-monitoring: Prometheus scrapes its own /metrics so we can watch
  # for scrape failures and TSDB issues from within the same dashboard.
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
